<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>George & Sophie's Workouts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#101214;
    --card:#191c20;
    --line:#262b31;
    --text:#f2f4f6;
    --dim:#96a0aa;
    --accent:#22d3ee;
    --rest:#38bdf8;
    --good:#4ade80;
    --chest:#f87171; --back:#60a5fa; --arms:#c084fc; --abs:#facc15; --legs:#34d399; --shoulders:#fb923c;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',-apple-system,system-ui,sans-serif;
    min-height:100vh;
  }
  #app{max-width:520px; margin:0 auto; padding:18px 16px 90px;}

  h1,h2{font-weight:800; letter-spacing:-.02em;}
  .eyebrow{font-size:11px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--dim);}

  button{font-family:inherit;}
  button:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  /* ---- topbar ---- */
  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
  .brand{font-weight:800; font-size:14px; letter-spacing:-.01em; color:var(--dim);}
  .brand b{color:var(--text);}
  .backbtn{
    background:none; border:1px solid var(--line); color:var(--text);
    border-radius:10px; padding:9px 14px; font-size:13px; font-weight:600; cursor:pointer;
  }
  .backbtn:active{background:var(--card);}

  /* ---- profile picker ---- */
  .picker{min-height:70vh; display:flex; flex-direction:column; justify-content:center;}
  .picker h1{font-size:30px; line-height:1.1; margin:0 0 6px;}
  .picker .sub{color:var(--dim); font-size:15px; margin:0 0 28px;}
  .profile-btn{
    width:100%; padding:20px; margin-bottom:12px; cursor:pointer; text-align:left;
    border:1px solid var(--line); border-radius:16px; background:var(--card); color:var(--text);
    display:flex; align-items:center; gap:16px;
  }
  .profile-btn:active{transform:scale(.98);}
  .profile-btn .avatar{
    width:52px; height:52px; border-radius:14px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; font-weight:800; color:#101214;
  }
  .profile-btn .pname{font-size:17px; font-weight:800; letter-spacing:-.01em;}
  .profile-btn .pdesc{font-size:13px; color:var(--dim); margin-top:3px; line-height:1.4;}

  /* ---- resume banner ---- */
  .resume-banner{
    background:var(--card); border:1px solid var(--accent); border-radius:16px;
    padding:16px; margin-bottom:16px;
  }
  .rb-detail{font-size:15px; font-weight:600; margin:8px 0 14px; line-height:1.45;}
  .rb-row{display:flex; gap:10px;}
  .rb-btn{flex:1; padding:13px; border:none; border-radius:12px; cursor:pointer; font-weight:800; font-size:14px;}
  .rb-btn.go{background:var(--accent); color:#101214;}
  .rb-btn.discard{background:none; border:1px solid var(--line); color:var(--dim);}

  /* ---- week ---- */
  .week-hero{margin:4px 0 18px;}
  .week-hero h1{font-size:26px; margin:0 0 4px;}
  .week-hero p{color:var(--dim); font-size:14px; margin:0; line-height:1.5;}
  .rules-card{
    width:100%; text-align:left; cursor:pointer;
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; margin-bottom:14px; color:var(--text);
    display:flex; justify-content:space-between; align-items:center; gap:12px;
  }
  .rules-card .t{font-size:14px; font-weight:800;}
  .rules-card .s{font-size:12px; color:var(--dim); margin-top:2px;}
  .rules-card .arrow{color:var(--accent); font-weight:800;}
  .daycard{
    width:100%; text-align:left; background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:15px 16px; margin-bottom:10px; cursor:pointer;
    display:flex; align-items:center; gap:14px; color:var(--text);
  }
  .daycard:active{transform:scale(.99);}
  .daycard .dot{width:10px; height:10px; border-radius:50%; flex-shrink:0;}
  .daycard .info{flex:1;}
  .daycard .dayname{font-weight:800; font-size:14px;}
  .daycard .focus{color:var(--dim); font-size:13px; margin-top:2px;}
  .daycard .count{font-size:12px; color:var(--dim); font-variant-numeric:tabular-nums; font-weight:600;}
  .daycard.rest-day{opacity:.45; cursor:default;}
  .done-badge{color:var(--good); font-size:12px; font-weight:800; margin-left:6px;}

  /* ---- growth rules ---- */
  .rules-head h1{font-size:26px; margin:0 0 4px;}
  .rules-head p{color:var(--dim); font-size:14px; margin:0 0 18px; line-height:1.5;}
  .rule{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:16px; margin-bottom:12px;
  }
  .rule h2{font-size:15px; margin:0 0 8px; color:var(--accent);}
  .rule p{font-size:14px; color:#c6cdd4; margin:0; line-height:1.6;}
  .rule ol{font-size:14px; color:#c6cdd4; margin:8px 0 0; padding-left:20px; line-height:1.7;}

  /* ---- day view ---- */
  .day-head h1{font-size:26px; margin:0 0 4px;}
  .day-head .focus-line{color:var(--dim); font-size:14px; margin-bottom:14px; line-height:1.5;}
  .diagram-wrap{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:14px; display:flex; justify-content:center; gap:10px; margin-bottom:14px;
  }
  .diagram-wrap svg{width:44%; max-width:170px; height:auto;}
  .muscle{fill:#22262c; stroke:#31373f; stroke-width:1; transition:fill .3s;}
  .bodyline{fill:none; stroke:#3a414a; stroke-width:2;}
  .figure-label{fill:var(--dim); font-size:9px; text-anchor:middle; text-transform:uppercase; letter-spacing:2px; font-family:'Inter',sans-serif; font-weight:600;}

  .ex-row{
    width:100%; text-align:left; background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:10px 14px 10px 10px; margin-bottom:8px; cursor:pointer; color:var(--text);
    display:flex; justify-content:space-between; align-items:center; gap:10px;
  }
  .ex-row .thumb{width:52px; height:52px; border-radius:10px; background:#fff; object-fit:cover; flex-shrink:0;}
  .ex-row .mid{flex:1;}
  .ex-row .nm{font-weight:800; font-size:14px; letter-spacing:-.01em;}
  .ex-row .muscles-tag{font-size:11px; color:var(--dim); margin-top:2px; letter-spacing:.04em; text-transform:uppercase; font-weight:600;}
  .ex-row .sr{color:var(--dim); font-size:12px; font-weight:600; font-variant-numeric:tabular-nums; text-align:right;}

  .startall{
    width:100%; padding:17px; margin-top:12px; border:none; border-radius:14px; cursor:pointer;
    background:var(--accent); color:#101214; font-size:15px; font-weight:800;
  }
  .startall:active{transform:scale(.98);}

  /* ---- player ---- */
  .player{text-align:center;}
  .progress-track{display:flex; gap:4px; margin-bottom:16px;}
  .progress-track span{flex:1; height:4px; border-radius:2px; background:var(--line);}
  .progress-track span.done{background:var(--accent);}
  .progress-track span.now{background:var(--text);}
  .ex-title{font-size:23px; margin:2px 0 4px;}
  .ex-sub{color:var(--dim); font-size:12px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; margin-bottom:12px;}

  .photo-panel{background:#fff; border-radius:16px; overflow:hidden; margin-bottom:12px; position:relative; border:1px solid var(--line);}
  .photo-panel img{width:100%; display:block; max-height:240px; object-fit:contain; background:#fff;}
  .photo-panel .pose-tag{
    position:absolute; bottom:10px; left:10px; background:rgba(16,18,20,.9);
    color:var(--text); font-size:11px; font-weight:600; letter-spacing:.08em;
    text-transform:uppercase; padding:6px 10px; border-radius:8px;
  }
  .photo-note{font-size:11px; color:var(--dim); margin:-4px 0 12px;}

  .mini-diagram{margin-bottom:12px;}
  .mini-diagram svg{width:34%; max-width:126px;}

  .howto{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:13px 15px; font-size:14px; color:#c6cdd4; text-align:left; line-height:1.6; margin-bottom:14px;
  }
  .load-chip{
    display:inline-block; background:var(--bg); border:1px solid var(--line); border-radius:8px;
    padding:3px 9px; font-size:12px; font-weight:600; color:var(--text); margin-bottom:8px;
  }
  .set-pips{display:flex; justify-content:center; gap:8px; margin-bottom:14px;}
  .pip{width:34px; height:34px; border-radius:50%; border:1px solid var(--line); display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:800; color:var(--dim); font-variant-numeric:tabular-nums;}
  .pip.done{background:var(--accent); border-color:var(--accent); color:#101214;}
  .pip.now{border-color:var(--text); color:var(--text);}

  .timer-block{margin-bottom:14px;}
  .big-time{font-size:68px; font-weight:800; font-variant-numeric:tabular-nums; line-height:1; letter-spacing:-.02em;}
  .big-time.resting{color:var(--rest);}
  .big-time.working{color:var(--accent);}
  .big-time.paused{opacity:.35;}
  .state-label{font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.14em; color:var(--dim); margin-top:8px;}

  .mainbtn{
    width:100%; padding:17px; border:none; border-radius:14px; cursor:pointer;
    background:var(--accent); color:#101214; font-size:15px; font-weight:800;
  }
  .mainbtn.resting{background:var(--rest);}
  .mainbtn:active{transform:scale(.98);}
  .subrow{display:flex; gap:8px; margin-top:10px;}
  .subbtn{
    flex:1; padding:12px; background:none; border:1px solid var(--line); border-radius:12px; color:var(--dim);
    font-size:13px; font-weight:600; cursor:pointer;
  }
  .subbtn.paused{border-color:var(--accent); color:var(--accent);}

  .rest-opts{display:flex; gap:8px; justify-content:center; margin:0 0 8px; flex-wrap:wrap;}
  .rest-opt{
    padding:9px 15px; border:1px solid var(--line); border-radius:10px; background:none;
    color:var(--dim); font-size:13px; font-weight:600; cursor:pointer; font-variant-numeric:tabular-nums;
  }
  .rest-opt.sel{background:var(--rest); border-color:var(--rest); color:#101214;}
  .rest-note{font-size:11px; color:var(--dim); margin:0 0 14px;}

  .finished-card{
    background:var(--card); border:1px solid var(--good); border-radius:18px;
    padding:30px 20px; margin-top:26px;
  }
  .finished-card h2{margin:0 0 6px; font-size:22px; color:var(--good);}
  .finished-card p{color:var(--dim); font-size:14px; margin:0 0 18px; line-height:1.5;}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important; animation:none !important;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============ STORAGE HELPERS ============ */
function lsGet(key, fallback){
  try{ const v = localStorage.getItem(key); return v === null ? fallback : JSON.parse(v); }catch(e){ return fallback; }
}
function lsSet(key, value){ try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e){} }
function lsRemove(key){ try{ localStorage.removeItem(key); }catch(e){} }

/* ============ ONE-TIME MIGRATION to v7 ============
   George's program changed completely, so his day history and any
   half-finished session get reset. Sophie's history is kept. */
if(!lsGet("gs_v7", false)){
  lsRemove("gs_session");
  const dd = lsGet("gs_doneDays", {george:{}, sophie:{}});
  dd.george = {};
  lsSet("gs_doneDays", dd);
  lsRemove("gs_voiceOn");
  lsRemove("gs_restLen");
  lsSet("gs_v7", true);
}

/* ============ PHOTOS: public-domain images from free-exercise-db ============ */
const IMG_BASE = "https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/";
function imgURL(id, pose){ return IMG_BASE + id + "/" + pose + ".jpg"; }
window.imgFail = function(imgEl){
  const alts = JSON.parse(imgEl.dataset.alts || "[]");
  if(alts.length){
    const next = alts.shift();
    imgEl.dataset.alts = JSON.stringify(alts);
    imgEl.dataset.id = next;
    imgEl.src = imgURL(next, imgEl.dataset.pose || "0");
  } else {
    const panel = imgEl.closest(".photo-panel");
    if(panel) panel.style.display = "none";
    if(imgEl.classList.contains("thumb")) imgEl.style.display = "none";
  }
};

/* ============ GEORGE'S EXERCISES — muscle growth, weights capped at 2x10kg ============ */
const EX_GEORGE = {
  /* --- push --- */
  "Bench press": {m:["chest","triceps","shoulders"], sets:4, reps:"12-15", rest:60, load:"2\u00d710kg",
    img:"Dumbbell_Bench_Press", imgAlt:["Alternating_Floor_Press"],
    how:"Flat on the floor or bench. Press up, then lower for a slow 3 count \u2014 the lowering is where growth happens. LAST SET IS A DROP SET: go to failure with the 10s, grab the 5s immediately, rep to failure again."},
  "Incline press": {m:["upperchest","shoulders","triceps"], sets:3, reps:"12-15", rest:60, load:"2\u00d710kg",
    img:"Incline_Dumbbell_Press", imgAlt:["Dumbbell_Bench_Press"],
    how:"Set an incline around 30-45\u00b0 (prop the bench or use stairs). Press up and slightly back. 3-second lowering, no bouncing at the bottom."},
  "Flyes": {m:["chest"], sets:3, reps:"15-20", rest:45, load:"2\u00d75kg",
    img:"Dumbbell_Flyes", imgAlt:["Around_The_Worlds"],
    how:"Slight bend in the elbows, lower wide until you feel a stretch across your chest, squeeze back together. 3-second lowering. When 20 slow reps is easy, move up to the 10s."},
  "Squeeze press": {m:["chest","triceps"], sets:3, reps:"12-15", rest:45, load:"2\u00d710kg",
    img:"Dumbbell_Bench_Press", imgAlt:["Alternating_Floor_Press"],
    how:"Press the two dumbbells into each other over your chest and keep squeezing them together the entire set. Constant tension \u2014 your chest never gets to relax."},
  "Overhead tricep extension": {m:["triceps"], sets:3, reps:"15", rest:45, load:"1\u00d710kg",
    img:"Standing_Dumbbell_Triceps_Extension", imgAlt:["Seated_Triceps_Press"],
    how:"One dumbbell, both hands, overhead. Lower behind your head bending only at the elbows, press back up. Elbows point forward, not out."},
  "Tricep kickbacks": {m:["triceps"], sets:3, reps:"15", rest:30, load:"2\u00d75kg",
    img:"Tricep_Dumbbell_Kickback", imgAlt:["Standing_Bent-Over_One-Arm_Dumbbell_Triceps_Extension"],
    how:"Hinge forward, upper arm locked parallel to the floor. Extend back until straight, squeeze hard for 1 second, return slow."},
  "Push-up burnout": {m:["chest","triceps","shoulders"], sets:2, reps:"max reps", rest:45,
    img:"Pushups", imgAlt:["Push-Up_Wide"],
    how:"As many strict push-ups as you can manage. Stop the set when your form breaks, not before. After everything else, this is the finisher that empties the tank."},

  /* --- pull --- */
  "Bent-over rows": {m:["lats","midback","biceps"], sets:4, reps:"12-15", rest:60, load:"2\u00d710kg",
    img:"Bent_Over_Two-Dumbbell_Row", imgAlt:["Bent_Over_Two-Dumbbell_Row_With_Palms_In"],
    how:"Hinge at the hips, flat back. Pull to your lower ribs, squeeze the shoulder blades together, then lower for a slow 3 count. The slow lowering matters more than the pull."},
  "Single-arm rows": {m:["lats","midback","biceps"], sets:3, reps:"12-15 / side", rest:45, load:"1\u00d710kg",
    img:"One-Arm_Dumbbell_Row", imgAlt:["Alternating_Kettlebell_Row"],
    how:"One hand braced on a bench or your knee. Row to your hip, not your chest. Full stretch at the bottom, hard squeeze at the top. Both sides = one set."},
  "Pullovers": {m:["lats","chest"], sets:3, reps:"15", rest:45, load:"1\u00d710kg",
    img:"Straight-Arm_Dumbbell_Pullover", imgAlt:["Bent-Arm_Dumbbell_Pullover"],
    how:"On your back, one dumbbell over your chest with both hands. Lower in an arc behind your head until you feel a big stretch, pull back over. Slow both ways."},
  "Renegade rows": {m:["lats","midback","abs","biceps"], sets:3, reps:"10 / side", rest:60, load:"2\u00d710kg",
    img:"Alternating_Renegade_Row", imgAlt:["One-Arm_Dumbbell_Row"],
    how:"Plank position, hands on the dumbbells. Row one to your hip while bracing so your hips don't twist. Alternate. (Photo shows kettlebells \u2014 same movement.)"},
  "Bicep curls": {m:["biceps"], sets:3, reps:"12-15", rest:45, load:"2\u00d710kg or 2\u00d75kg",
    img:"Dumbbell_Bicep_Curl", imgAlt:["Dumbbell_Alternate_Bicep_Curl","Standing_Dumbbell_Curl"],
    how:"Elbows pinned to your sides, zero swinging. Use the 10s only if you can stay strict \u2014 otherwise 5s with a 3-second lowering beats cheated 10s every time. LAST SET IS A DROP SET: failure, drop to 5s, failure again."},
  "Zottman curls": {m:["biceps"], sets:3, reps:"12", rest:45, load:"2\u00d75kg",
    img:"Zottman_Curl", imgAlt:["Alternate_Hammer_Curl"],
    how:"The one you asked about. Curl up palms facing up, rotate at the top so palms face down, lower slowly for 3-4 seconds, rotate back at the bottom. The slow palms-down lowering hammers the forearms \u2014 that's the whole point."},
  "Hammer curls": {m:["biceps"], sets:2, reps:"15", rest:30, load:"2\u00d75kg",
    img:"Alternate_Hammer_Curl", imgAlt:["Hammer_Curls"],
    how:"Palms facing each other the whole time. Hits the thicker part of the arm and the forearms. LAST SET: after failure, do slow half-reps until your grip gives out."},

  /* --- legs --- */
  "Goblet squats": {m:["quads","glutes","hams"], sets:4, reps:"15-20", rest:60, load:"8kg KB or 1\u00d710kg",
    img:"Goblet_Squat", imgAlt:["Plie_Dumbbell_Squat","Bodyweight_Squat"],
    how:"Hold the kettlebell or a dumbbell against your chest. Squat until thighs are at least parallel, pause 1 full second at the bottom, drive up. The pause removes all bounce \u2014 it makes light weight feel heavy."},
  "Walking lunges": {m:["quads","glutes","hams"], sets:3, reps:"12 / side", rest:60, load:"2\u00d710kg",
    img:"Dumbbell_Lunges", imgAlt:["Bodyweight_Walking_Lunge"],
    how:"Dumbbells at your sides. Step forward, lower the back knee toward the floor, drive through the front heel straight into the next step. Controlled, no wobbling."},
  "Romanian deadlifts": {m:["lowback","glutes","hams"], sets:3, reps:"15", rest:60, load:"2\u00d710kg",
    img:"Romanian_Deadlift_With_Dumbbells", imgAlt:["Stiff-Legged_Dumbbell_Deadlift","Stiff_Legged_Dumbbell_Deadlift"],
    how:"Dumbbells in front of your thighs. Push your hips back, flat back, lower to mid-shin over a slow 4 count, feel the hamstrings stretch, drive hips forward to stand. A hinge, not a squat."},
  "Calf raises": {m:["quads"], sets:4, reps:"20", rest:30, load:"2\u00d710kg",
    img:"Standing_Dumbbell_Calf_Raise", imgAlt:["Standing_Calf_Raises"],
    how:"Dumbbells at your sides, rise slowly onto your toes, squeeze 1 second at the top, lower for a 3 count. Do them off a step for a deeper stretch if you can."},
  "Bike or treadmill intervals": {m:["quads","hams"], sets:1, reps:"10 min", timed:600, rest:0,
    how:"30 seconds hard, 60 seconds easy, repeat until the timer dies. Hard means you couldn't hold a conversation. This keeps you lean while you build \u2014 which is what makes the six pack visible."},

  /* --- shoulders --- */
  "Arnold press": {m:["shoulders","triceps"], sets:4, reps:"12-15", rest:60, load:"2\u00d710kg",
    img:"Arnold_Dumbbell_Press", imgAlt:["Standing_Dumbbell_Press"],
    how:"Start with palms facing you at shoulder height, rotate out as you press overhead, reverse on the way down. Drop to the 5s the moment your lower back starts arching to cheat the weight up."},
  "Lateral raises": {m:["shoulders"], sets:4, reps:"15-20", rest:45, load:"2\u00d75kg",
    img:"Side_Lateral_Raise", imgAlt:["Power_Partials"],
    how:"Slight bend in the elbows, raise to shoulder height, lower for a slow 3 count. No swinging \u2014 if you're rocking, it doesn't count. LAST SET: after failure, keep doing half-reps until you physically can't."},
  "Front raises": {m:["shoulders"], sets:3, reps:"12", rest:45, load:"2\u00d75kg",
    img:"Front_Dumbbell_Raise", imgAlt:["Side_Lateral_Raise"],
    how:"Raise the dumbbells straight in front to shoulder height, alternate or together. Slow down, no momentum."},
  "Rear delt flyes": {m:["shoulders","midback"], sets:3, reps:"15-20", rest:45, load:"2\u00d75kg",
    img:"Seated_Bent-Over_Rear_Delt_Raise", imgAlt:["Reverse_Flyes"],
    how:"Hinge forward, arms hanging, raise the dumbbells out wide like spreading wings. Rear delts are what make shoulders look 3D from every angle \u2014 nobody trains them, everybody should."},

  /* --- core --- */
  "Weighted sit-ups": {m:["abs"], sets:3, reps:"15-20", rest:45, load:"1\u00d75kg on chest",
    img:"3_4_Sit-Up", imgAlt:["Sit-Up"],
    how:"Dumbbell held against your chest. Sit up under control, lower back down for a slow 3 count \u2014 don't flop. Weighted ab work is what builds abs that show; cardio is what uncovers them."},
  "Leg raises": {m:["abs"], sets:3, reps:"15", rest:45,
    img:"Flat_Bench_Lying_Leg_Raise", imgAlt:["Scissor_Kick"],
    how:"Flat on your back, hands under your bum, legs straight. Raise to vertical, lower slowly until your heels hover just off the floor \u2014 don't let them touch down. Lower back stays pressed into the mat."},
  "Russian twists": {m:["obliques","abs"], sets:3, reps:"20", rest:30, load:"1\u00d75kg",
    img:"Russian_Twist", imgAlt:["Seated_Barbell_Twist"],
    how:"Sit back at 45\u00b0, rotate the dumbbell side to side. Feet up = harder. One left-right = one rep."},
  "Deadbug": {m:["abs"], sets:3, reps:"12 / side", rest:30,
    img:"Dead_Bug", imgAlt:["Bent-Knee_Hip_Raise"],
    how:"On your back, arms straight up, knees at 90\u00b0. Extend opposite arm and leg away slowly, lower back glued to the floor the whole time."},
  "Side plank": {m:["obliques","abs"], sets:2, reps:"30 sec / side", timed:30, rest:30,
    img:"Side_Bridge", imgAlt:["Plank"],
    how:"Forearm down, feet stacked, hips lifted into one straight line. The timer runs one 30-second hold \u2014 do one set per side."},

  document.documentElement.style.setProperty("--accent", profile ? P().accent : "#22d3ee");
}
function suggestedRest(ex){ return ex.rest === undefined ? 45 : ex.rest; }
function effectiveRest(ex){ return restOverride === null ? suggestedRest(ex) : restOverride; }

/* session persistence */
function saveSession(){
  if(screen.name!=="player" || screen.mode==="finished") return;
  lsSet("gs_session", { profile, dayIdx:screen.dayIdx, exIdx:screen.exIdx, set:screen.set, exList:screen.exList, restOverride, savedAt:Date.now() });
}
function clearSession(){ lsRemove("gs_session"); }
function getSession(){
  const s = lsGet("gs_session", null);
  if(!s || !PROFILES[s.profile]) return null;
  const wk = PROFILES[s.profile].week;
  if(!wk[s.dayIdx] || !s.exList || !s.exList[s.exIdx]) return null;
  if(!PROFILES[s.profile].ex[s.exList[s.exIdx]]) return null;
  return s;
}

/* ============ AUDIO BEEPS ============ */
let audioCtx = null;
function beep(freq, dur){
  freq = freq || 880; dur = dur || 0.15;
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.frequency.value = freq; o.type="square";
    g.gain.setValueAtTime(0.08, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

function topbarHTML(backAction, backText){
  return `
    <div class="topbar">
      ${backAction ? `<button class="backbtn" onclick="${backAction}">\u2190 ${backText}</button>` : `<div></div>`}
      <div class="brand"><b>${profile ? P().name : "G&S"}</b> \u00b7 Workouts</div>
    </div>`;
}

function render(){
  clearInterval(timerInt);
  clearInterval(poseInt);
  paused = false;
  setAccent();
  if(screen.name==="picker") renderPicker();
  else if(screen.name==="week") renderWeek();
  else if(screen.name==="rules") renderRules();
  else if(screen.name==="day") renderDay(screen.dayIdx);
  else if(screen.name==="player") renderPlayer();
  window.scrollTo(0,0);
}

  const s = getSession();
  if(!s) return "";
  const pr = PROFILES[s.profile];
  const d = pr.week[s.dayIdx];

      <div class="rb-detail">${pr.name} \u00b7 ${d.day} \u00b7 ${d.focus}<br>${exName} \u2014 set ${s.set}</div>

  const s = getSession();
  if(!s) return;
  profile = s.profile;
  restOverride = (s.restOverride === undefined) ? null : s.restOverride;
  screen = {name:"player", dayIdx:s.dayIdx, exIdx:s.exIdx, set:s.set, mode:"work", t:0, exList:s.exList};
  const ex = P().ex[s.exList[s.exIdx]];

  render();
};

  app.innerHTML = `
    ${topbarHTML("goWeek()","Week")}
    <div class="day-head">
      <h1>${d.day}</h1>
      <div class="focus-line">${d.focus}${d.lighter?' \u2014 take it a touch easier than earlier in the week':''}</div>
    </div>
    <div class="diagram-wrap">${bodySVG(muscles)}</div>
    ${d.ex.map((e,j)=>{
      const x = P().ex[e];
      return `<button class="ex-row" onclick="startPlayer(${i},${j})">
        ${x.img ? `<img class="thumb" src="${imgURL(x.img,0)}" data-id="${x.img}" data-pose="0" data-alts='${JSON.stringify(x.imgAlt||[])}' onerror="imgFail(this)" alt="" loading="lazy">` : ""}
        <div class="mid"><div class="nm">${e}</div><div class="muscles-tag">${x.load ? x.load+" \u00b7 " : ""}${x.m.join(" \u00b7 ")}</div></div>
        <div class="sr">${x.sets}\u00d7${x.reps}</div>
      </button>`;
    }).join("")}
    <button class="startall" onclick="startPlayer(${i},0)">Start workout</button>
  `;
}

/* ============ PLAYER ============ */
window.startPlayer = (dayIdx, exIdx) => {
  const d = P().week[dayIdx];
  const exList = d.ex.slice();
  screen = {name:"player", dayIdx, exIdx, set:1, mode:"work", t:0, exList};
  const ex = P().ex[exList[exIdx]];
  if(ex.timed) screen.t = ex.timed;
  saveSession();
  render();
};

function renderPlayer(){
  const d = P().week[screen.dayIdx];
  const exList = screen.exList;
  const name = exList[screen.exIdx];
  const ex = P().ex[name];
  const isTimed = !!ex.timed;

  if(screen.mode==="finished"){
    doneDays[profile][screen.dayIdx]=true;
    lsSet("gs_doneDays", doneDays);
    clearSession();
    app.innerHTML = `
      ${topbarHTML("goWeek()","Week")}
      <div class="player">
        <div class="finished-card">
          <div class="eyebrow" style="color:var(--good)">Session complete</div>
          <h2>Workout done</h2>
          <p>${d.day} \u2014 ${d.focus} complete. ${profile==="george" ? "Now go eat \u2014 protein and water. The workout only works if you feed it." : "Nice one, "+P().name+". Water, food, recover."}</p>
          <button class="mainbtn" onclick="goWeek()">Back to week</button>
        </div>
      </div>`;
    return;
  }

  saveSession();

  const resting = screen.mode==="rest";
  const working = screen.mode==="timedwork";
  const sugg = suggestedRest(ex);
  const eff = effectiveRest(ex);
  const restOptsHTML = `
    <div class="rest-opts">
      ${[30,45,60,90].map(s=>`<button class="rest-opt ${eff===s?'sel':''}" onclick="setRest(${s})">${s}s</button>`).join("")}
    </div>
    <div class="rest-note">Suggested for this exercise: ${sugg}s${restOverride!==null && restOverride!==sugg ? ` \u00b7 you've overridden to ${restOverride}s \u00b7 <a href="#" style="color:var(--accent)" onclick="clearRestOverride(); return false;">use suggested</a>` : ""}</div>`;

  app.innerHTML = `
    ${topbarHTML("exitPlayer()","Exit")}
    <div class="player">
      <div class="progress-track">
        ${exList.map((_,j)=>`<span class="${j<screen.exIdx?'done':j===screen.exIdx?'now':''}"></span>`).join("")}
      </div>
      <h1 class="ex-title">${name}</h1>
      <div class="ex-sub">EX ${screen.exIdx+1}/${exList.length} \u00b7 ${ex.sets} sets \u00d7 ${ex.reps}</div>

      ${ex.img ? `
      <div class="photo-panel">
        <img id="poseImg" src="${imgURL(ex.img,0)}" data-id="${ex.img}" data-pose="0" data-alts='${JSON.stringify(ex.imgAlt||[])}' onerror="imgFail(this)" alt="How to do ${name}">
        <div class="pose-tag" id="poseTag">Start position</div>
      </div>
      <div class="photo-note">Photo flips between start and finish \u00b7 public-domain images (free-exercise-db)</div>` : ""}

      <div class="diagram-wrap mini-diagram">${bodySVG(ex.m)}</div>
      <div class="howto">${ex.load ? `<span class="load-chip">${ex.load}</span><br>` : ""}${ex.how}</div>
      <div class="set-pips">
        ${Array.from({length:ex.sets},(_,s)=>`<div class="pip ${s+1<screen.set?'done':s+1===screen.set?'now':''}">${s+1}</div>`).join("")}
      </div>

      ${resting ? `
        <div class="timer-block">
          <div class="big-time resting" id="clock">${fmt(screen.t)}</div>
          <div class="state-label">Rest \u00b7 next: ${nextLabel()}</div>
        </div>
        ${restOptsHTML}
        <button class="mainbtn resting" onclick="skipRest()">Skip rest</button>
        <div class="subrow">
          <button class="subbtn" id="pauseBtn" onclick="togglePause()">Pause</button>
          <button class="subbtn" onclick="addRest()">+15 sec</button>
        </div>
      ` : working ? `
        <div class="timer-block">
          <div class="big-time working" id="clock">${fmt(screen.t)}</div>
          <div class="state-label">Go \u00b7 set ${screen.set}/${ex.sets}</div>
        </div>
        <button class="mainbtn" onclick="finishSet()">Done early</button>
        <div class="subrow">
          <button class="subbtn" id="pauseBtn" onclick="togglePause()">Pause</button>
        </div>
      ` : `
        <div class="timer-block">
          <div class="big-time">${isTimed ? fmt(ex.timed) : ex.reps}</div>
          <div class="state-label">${isTimed ? "Timed" : "Reps"} \u00b7 set ${screen.set}/${ex.sets}</div>
        </div>
        ${restOptsHTML}
        <button class="mainbtn" onclick="${isTimed?'startTimedSet()':'finishSet()'}">${isTimed?'Start':'Set done'}</button>
        <div class="subrow">
          <button class="subbtn" onclick="skipExercise()">Skip exercise</button>
        </div>
      `}
    </div>
  `;

  const img = document.getElementById("poseImg");
  const tag = document.getElementById("poseTag");
  if(img){
    let pose = 0;
    poseInt = setInterval(()=>{
      if(img.style.display==="none") { clearInterval(poseInt); return; }
      pose = 1 - pose;
      img.dataset.pose = String(pose);
      img.src = imgURL(img.dataset.id, pose);
      if(tag) tag.textContent = pose===0 ? "Start position" : "Finish position";
    }, 1500);
  }

  if(resting || working){
    timerInt = setInterval(()=>{
      if(paused) return;
      screen.t--;
      const c = document.getElementById("clock");
      if(c) c.textContent = fmt(screen.t);
      if(screen.t===3||screen.t===2||screen.t===1) beep(660,0.1);
      if(screen.t<=0){
        clearInterval(timerInt);
        beep(1046,0.3);
        if(resting){
          screen.mode="work";
          render();
        } else {
          finishSetInternal();
          render();
        }
      }
    },1000);
  }
}

window.togglePause = () => {
  paused = !paused;
  const btn = document.getElementById("pauseBtn");
  const clock = document.getElementById("clock");
  if(btn){ btn.textContent = paused ? "Resume" : "Pause"; btn.classList.toggle("paused", paused); }
  if(clock){ clock.classList.toggle("paused", paused); }
};

window.exitPlayer = () => {
  clearSession();
  screen = {name:"day", dayIdx:screen.dayIdx};
  render();
};

function fmt(s){ s=Math.max(0,s); return `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`; }

function nextLabel(){
  const exList = screen.exList;
  const ex = P().ex[exList[screen.exIdx]];
  if(screen.set <= ex.sets) return `Set ${screen.set} of ${exList[screen.exIdx]}`;
  return exList[screen.exIdx+1] || "Finish";
}

window.setRest = s => { restOverride = s; saveSession(); render(); };
window.clearRestOverride = () => { restOverride = null; saveSession(); render(); };
window.skipRest = () => { clearInterval(timerInt); screen.mode="work"; render(); };
window.addRest = () => { screen.t += 15; };

window.startTimedSet = () => {
  const ex = P().ex[screen.exList[screen.exIdx]];
  screen.mode = "timedwork"; screen.t = ex.timed;
  beep(1046,0.2);
  render();
};

window.finishSet = () => { clearInterval(timerInt); finishSetInternal(); render(); };

function finishSetInternal(){
  const exList = screen.exList;
  const curName = exList[screen.exIdx];
  const ex = P().ex[curName];
  if(screen.set >= ex.sets){
    if(screen.exIdx >= exList.length-1){ screen.mode="finished"; return; }
    screen.exIdx++; screen.set=1;
    const nextEx = P().ex[exList[screen.exIdx]];
    screen.mode="rest"; screen.t=effectiveRest(nextEx)+15;
  } else {
    screen.set++;
    screen.mode="rest"; screen.t=effectiveRest(ex);
  }
  saveSession();
}

window.skipExercise = () => {
  const exList = screen.exList;
  if(screen.exIdx >= exList.length-1){ screen.mode="finished"; }
  else {
    screen.exIdx++; screen.set=1; screen.mode="work";
    const ex=P().ex[exList[screen.exIdx]];
    screen.t = ex.timed ? ex.timed : 0;
    saveSession();
  }
  render();
};

render();
</script>
</body>
</html>
